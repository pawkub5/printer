<!DOCTYPE html>
<html>
<head>
    <title>Print from Anywhere</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ADD YOUR FIREBASE URL HERE (keep the quotes)
        const firebaseConfig = {
            databaseURL: "https://printer-fd73c-default-rtdb.firebaseio.com/" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('imageInput').addEventListener('change', handleImage);

        function handleImage(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    processAndSendToFirebase(img);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        function processAndSendToFirebase(img) {
            document.getElementById('status').innerText = "Processing image...";
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Force width to 384 (standard 58mm printer width)
            const printWidth = 384; 
            const scale = printWidth / img.width;
            const printHeight = Math.floor(img.height * scale);
            
            canvas.width = printWidth;
            canvas.height = printHeight;
            
            // Draw and get pixel data
            ctx.drawImage(img, 0, 0, printWidth, printHeight);
            const imageData = ctx.getImageData(0, 0, printWidth, printHeight);
            const pixels = imageData.data;

            // ESC/POS Command: GS v 0 (Print Raster Image)
            let escpos = [0x1D, 0x76, 0x30, 0x00]; 
            
            let xBytes = printWidth / 8; // 48 bytes across
            escpos.push(xBytes % 256, Math.floor(xBytes / 256)); // Width
            escpos.push(printHeight % 256, Math.floor(printHeight / 256)); // Height

            // Convert to 1-bit black and white and pack into bytes
            for (let y = 0; y < printHeight; y++) {
                for (let x = 0; x < printWidth; x += 8) {
                    let byte = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        let i = ((y * printWidth) + (x + bit)) * 4;
                        // Simple threshold: if pixel is dark, set bit to 1 (print black)
                        let brightness = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                        if (brightness < 128) {
                            byte |= (1 << (7 - bit));
                        }
                    }
                    escpos.push(byte);
                }
            }

            // Convert byte array to Base64 safely
            let binary = '';
            const bytes = new Uint8Array(escpos);
            const len = bytes.byteLength;
            for (let i = 0; i < len; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            const base64Data = window.btoa(binary);

            // Send to Firebase
            document.getElementById('status').innerText = "Sending to Cloud...";
            set(ref(db, 'Print_Queue'), base64Data).then(() => {
                document.getElementById('status').innerText = "Sent successfully! Printer should start soon.";
            }).catch((error) => {
                document.getElementById('status').innerText = "Error: " + error;
            });
        }
    </script>
</head>
<body style="font-family: sans-serif; text-align: center; margin-top: 50px;">
    <h2>Send Image to Printer</h2>
    <input type="file" id="imageInput" accept="image/*" />
    <p id="status" style="font-weight: bold; color: blue;"></p>
</body>
</html>
