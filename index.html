<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F3F4F6;
            --surface: #FFFFFF;
            --text: #1F2937;
            --text-light: #6B7280;
            --border: #E5E7EB;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--surface);
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 24px;
            text-align: center;
            font-size: 1.5rem;
            color: var(--text);
        }

        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text);
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            height: 100%;
        }

        .btn-outline {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            background-color: var(--surface);
            border: 2px dashed var(--border);
            color: var(--text-light);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .file-input-wrapper:hover .btn-outline {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* New styles for the preview frame */
        .preview-frame {
            display: none; /* Hidden until an image is selected */
            width: 100%;
            padding: 12px;
            background-color: var(--surface);
            border: 2px dashed var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            margin-top: 8px;
            text-align: center;
        }

        .preview-frame canvas {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
            margin: 0 auto;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-primary:disabled {
            background-color: var(--text-light);
            cursor: not-allowed;
        }

        #status {
            margin-top: 16px;
            text-align: center;
            font-size: 0.875rem;
            font-weight: 600;
            min-height: 20px;
        }
        
        .status-success { color: #10B981; }
        .status-error { color: #EF4444; }
        .status-processing { color: var(--primary); }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ADD YOUR FIREBASE URL HERE
        const firebaseConfig = {
            databaseURL: "YOUR_FIREBASE_DATABASE_URL" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const printBtn = document.getElementById('printBtn');
        const statusEl = document.getElementById('status');
        const imageInput = document.getElementById('imageInput');
        const fileNameDisplay = document.getElementById('fileName');
        const previewFrame = document.getElementById('previewFrame');
        const previewCanvas = document.getElementById('previewCanvas');
        const ctx = previewCanvas.getContext('2d', { willReadFrequently: true });

        // Store the processed ESC/POS bytes so we don't re-process on print
        let processedImageBytes = null;

        // Update UI and generate preview when file is selected
        imageInput.addEventListener('change', async (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                fileNameDisplay.innerText = file.name;
                previewFrame.style.display = 'block'; // Show the preview frame
                setStatus("Generating preview...", "processing");
                
                try {
                    await generatePreviewAndBuffer(file);
                    setStatus("", ""); // Clear status
                } catch (err) {
                    setStatus("Error generating preview.", "error");
                }
            } else {
                // Reset if user cancels file selection
                fileNameDisplay.innerText = "Click to select an image";
                previewFrame.style.display = 'none';
                processedImageBytes = null;
            }
        });

        printBtn.addEventListener('click', handlePrintJob);

        function setStatus(message, type) {
            statusEl.innerText = message;
            statusEl.className = `status-${type}`;
        }

        function generatePreviewAndBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        // Force width to 384 (standard 58mm printer width)
                        const printWidth = 384; 
                        const scale = printWidth / img.width;
                        const printHeight = Math.floor(img.height * scale);
                        
                        previewCanvas.width = printWidth;
                        previewCanvas.height = printHeight;
                        
                        // Draw original image to canvas
                        ctx.drawImage(img, 0, 0, printWidth, printHeight);
                        const imageData = ctx.getImageData(0, 0, printWidth, printHeight);
                        const pixels = imageData.data;

                        // ESC/POS Command: GS v 0 (Print Raster Image)
                        let imgEscpos = [0x1D, 0x76, 0x30, 0x00]; 
                        
                        let xBytes = printWidth / 8; // 48 bytes across
                        imgEscpos.push(xBytes % 256, Math.floor(xBytes / 256)); // Width
                        imgEscpos.push(printHeight % 256, Math.floor(printHeight / 256)); // Height

                        // Process pixels: Build ESC/POS byte array AND update visual canvas to black & white
                        for (let y = 0; y < printHeight; y++) {
                            for (let x = 0; x < printWidth; x += 8) {
                                let byte = 0;
                                for (let bit = 0; bit < 8; bit++) {
                                    let i = ((y * printWidth) + (x + bit)) * 4;
                                    let brightness = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                                    
                                    if (brightness < 128) {
                                        byte |= (1 << (7 - bit));
                                        // Update canvas pixel to visually show black
                                        pixels[i] = 0;     // R
                                        pixels[i+1] = 0;   // G
                                        pixels[i+2] = 0;   // B
                                    } else {
                                        // Update canvas pixel to visually show white
                                        pixels[i] = 255;   // R
                                        pixels[i+1] = 255; // G
                                        pixels[i+2] = 255; // B
                                    }
                                    pixels[i+3] = 255; // Alpha opaque
                                }
                                imgEscpos.push(byte);
                            }
                        }
                        
                        // Push the black and white pixels back to the canvas so the user sees it
                        ctx.putImageData(imageData, 0, 0);
                        
                        // Store the byte array for printing
                        processedImageBytes = imgEscpos;
                        resolve();
                    }
                    img.onerror = () => reject(new Error("Failed to load image"));
                    img.src = event.target.result;
                }
                reader.onerror = () => reject(new Error("Failed to read file"));
                reader.readAsDataURL(file);
            });
        }

        async function handlePrintJob() {
            const textNote = document.getElementById('noteInput').value;

            if (!textNote.trim() && !processedImageBytes) {
                setStatus("Please add a note or select an image.", "error");
                return;
            }

            printBtn.disabled = true;
            setStatus("Preparing print job...", "processing");

            try {
                // Initialize Printer (ESC @)
                let escpos = [0x1B, 0x40]; 

                // 1. Process Text Note
                if (textNote.trim()) {
                    const encoder = new TextEncoder();
                    const textBytes = encoder.encode(textNote + "\n\n");
                    for (let b of textBytes) {
                        escpos.push(b);
                    }
                }

                // 2. Add Pre-processed Image
                if (processedImageBytes) {
                    escpos = escpos.concat(processedImageBytes);
                }

                // 3. Feed paper at the end so it clears the tear bar
                escpos.push(0x0A, 0x0A, 0x0A, 0x0A);

                // 4. Convert full buffer to Base64
                let binary = '';
                const bytes = new Uint8Array(escpos);
                const len = bytes.byteLength;
                for (let i = 0; i < len; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                const base64Data = window.btoa(binary);

                // 5. Send to Firebase
                setStatus("Transmitting to hardware...", "processing");
                await set(ref(db, 'Print_Queue'), base64Data);
                
                setStatus("Sent successfully! Printer should start.", "success");
                
                // Reset inputs and UI
                document.getElementById('noteInput').value = '';
                imageInput.value = '';
                fileNameDisplay.innerText = "Click to select an image";
                previewFrame.style.display = 'none';
                processedImageBytes = null;

            } catch (error) {
                setStatus("Error: " + error.message, "error");
            } finally {
                printBtn.disabled = false;
            }
        }
    </script>
</head>
<body>
    <div class="card">
        <h2>Remote Print</h2>
        
        <div class="input-group">
            <label for="noteInput">Print a Note</label>
            <textarea id="noteInput" placeholder="Type your message here..."></textarea>
        </div>

        <div class="input-group">
            <label>Add an Image</label>
            <div class="file-input-wrapper">
                <div class="btn-outline" id="fileName">
                    Click to select an image
                </div>
                <input type="file" id="imageInput" accept="image/*" />
            </div>
            
            <!-- Preview Canvas Container -->
            <div class="preview-frame" id="previewFrame">
                <canvas id="previewCanvas"></canvas>
            </div>
        </div>

        <button id="printBtn" class="btn-primary">Send to Printer</button>
        <div id="status"></div>
    </div>
</body>
</html>
